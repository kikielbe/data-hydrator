<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZK Vault Mobile</title>
    
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes"> <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-bg: #f1f5f9;
            --accent-color: #0284c7;
            --dark-navy: #0f172a;
        }

        body { 
            background-color: var(--primary-bg); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            padding-bottom: 100px;
            color: #1e293b;
        }

        .mobile-header {
            background: var(--dark-navy);
            color: white;
            padding: 25px 20px;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .data-card {
            border: none;
            border-radius: 18px;
            background: white;
            margin-bottom: 12px;
            padding: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.04);
            transition: transform 0.1s ease;
        }

        .data-card:active { transform: scale(0.97); }

        .id-label {
            font-size: 0.7rem;
            font-weight: 800;
            color: #94a3b8;
            letter-spacing: 0.5px;
            font-family: monospace;
        }

        .name-label {
            font-size: 1rem;
            font-weight: 700;
            color: var(--dark-navy);
        }

        .status-badge {
            font-size: 0.65rem;
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: 800;
        }

        /* Bottom Navigation Modern */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 85px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding-bottom: 15px;
            border-top: 1px solid #e2e8f0;
            z-index: 2000;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }

        .nav-item {
            text-align: center;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.65rem;
            font-weight: 800;
            flex: 1;
        }

        .nav-item.active { color: var(--accent-color); }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 4px; }

        .nav-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            top: -20px;
        }

        .fab-link {
            background: linear-gradient(135deg, #0284c7, #0369a1);
            color: white;
            width: 62px;
            height: 62px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 6px solid var(--primary-bg);
            box-shadow: 0 8px 25px rgba(2, 132, 199, 0.4);
            margin-bottom: 6px;
        }

        .fab-label {
            color: var(--accent-color);
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="mobile-header">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <h4 class="fw-bold mb-0">ZK Vault</h4>
            <small id="statusText" class="opacity-75">Status: Disconnected</small>
        </div>
        <div id="connectionDot" class="rounded-circle" style="width: 12px; height: 12px; background: #ef4444; border: 2px solid rgba(255,255,255,0.2);"></div>
    </div>
</div>

<div class="container mt-4">
    <div id="dataContainer"></div>

    <div class="d-flex justify-content-between align-items-center mt-4 mb-4" id="paginationControls">
        <button class="btn btn-dark btn-sm rounded-pill px-4" id="prevBtn" onclick="changePage(-1)">
            <i class="bi bi-chevron-left"></i>
        </button>
        <span class="fw-bold text-secondary small" id="pageIndicator">Page 1 of 1</span>
        <button class="btn btn-dark btn-sm rounded-pill px-4" id="nextBtn" onclick="changePage(1)">
            <i class="bi bi-chevron-right"></i>
        </button>
    </div>
</div>

<div class="bottom-nav">
    <a href="#" class="nav-item active" onclick="window.scrollTo({top:0, behavior:'smooth'})">
        <i class="bi bi-shield-lock-fill"></i>
        <span>VAULT</span>
    </a>
    
    <label class="nav-center">
        <div class="fab-link">
            <i class="bi bi-plus-lg fs-3"></i>
        </div>
        <span class="fab-label">LINK</span>
        <input type="file" id="filePicker" accept=".json" hidden>
    </label>

    <a href="#" class="nav-item" onclick="resetApp()">
        <i class="bi bi-arrow-counterclockwise"></i>
        <span>RESET</span>
    </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    // Data Simulasi Server
    const serverNodes = Array.from({length: 100}, (_, i) => ({
        uuid: `ID-${1001 + i}`,
        masked: `NODE_0x${(1000 + i).toString(16).toUpperCase()}`
    }));

    let localMap = null;
    let currentPage = 1;
    const itemsPerPage = 10;

    function init() {
        const saved = localStorage.getItem('zk_simple_key');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('connectionDot');

        if (saved) {
            try {
                localMap = JSON.parse(saved);
                statusText.innerText = "Status: Connected";
                statusDot.style.background = "#10b981";
            } catch(e) {
                localStorage.removeItem('zk_simple_key');
            }
        } else {
            localMap = null;
            statusText.innerText = "Status: Masked";
            statusDot.style.background = "#ef4444";
        }
        render();
    }

    function render() {
        const container = document.getElementById('dataContainer');
        container.innerHTML = "";

        // True Hydration: Gunakan serverNodes sebagai basis data utama
        const dataSource = serverNodes; 

        const totalPages = Math.ceil(dataSource.length / itemsPerPage) || 1;
        if (currentPage > totalPages) currentPage = totalPages;

        const start = (currentPage - 1) * itemsPerPage;
        const pageData = dataSource.slice(start, start + itemsPerPage);

        pageData.forEach(node => {
            const realName = localMap ? localMap[node.uuid] : null;
            container.innerHTML += `
                <div class="data-card">
                    <div>
                        <div class="id-label">${node.uuid}</div>
                        <div class="name-label">${realName ? realName : node.masked}</div>
                    </div>
                    <div>
                        ${realName 
                            ? '<span class="status-badge bg-success-subtle text-success">VERIFIED</span>' 
                            : '<span class="status-badge bg-light text-muted">MASKED</span>'}
                    </div>
                </div>`;
        });

        document.getElementById('pageIndicator').innerText = `Page ${currentPage} of ${totalPages}`;
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage === totalPages);
        document.getElementById('paginationControls').style.display = (totalPages <= 1) ? 'none' : 'flex';
    }

    function changePage(step) {
        currentPage += step;
        render();
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    document.getElementById('filePicker').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                JSON.parse(ev.target.result); 
                localStorage.setItem('zk_simple_key', ev.target.result);
                init();
                Swal.fire({ icon: 'success', title: 'Identity Linked', toast: true, position: 'top', showConfirmButton: false, timer: 1500 });
            } catch(err) {
                Swal.fire('Error', 'Format JSON salah', 'error');
            }
        };
        reader.readAsText(e.target.files[0]);
    });

    function resetApp() {
        Swal.fire({
            title: 'Clear Session?',
            text: "Koneksi ke identitas lokal akan diputus.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#0f172a',
            confirmButtonText: 'Ya, Clear'
        }).then((result) => {
            if (result.isConfirmed) {
                localStorage.removeItem('zk_simple_key');
                init();
            }
        });
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
    }

    window.onload = init;
</script>
</body>
</html>
